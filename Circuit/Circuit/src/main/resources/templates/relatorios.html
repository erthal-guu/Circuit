<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head.html :: head(titulo = 'Relatórios')}">
</head>
<body>
<div class="container">
    <div th:replace="~{fragments/menu :: sidebar('relatorios')}"></div>

    <main class="main-content">
        <header th:replace="~{fragments/header.html :: header}" class="top-bar"></header>

        <div class="content">
            <div class="reports-header">
                <div>
                    <h1 class="reports-title">Relatórios</h1>
                    <p class="reports-subtitle">Selecione o tipo de relatório e gere o PDF</p>
                </div>
            </div>

            <div class="reports-container">
                <div class="form-card">
                    <div class="form-header">
                        <div class="form-header-icon">
                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                <polyline points="14 2 14 8 20 8"></polyline>
                                <line x1="16" y1="13" x2="8" y2="13"></line>
                                <line x1="16" y1="17" x2="8" y2="17"></line>
                                <polyline points="10 9 9 9 8 9"></polyline>
                            </svg>
                        </div>
                        <div class="form-header-content">
                            <h3>Configuração do Relatório</h3>
                            <p>Escolha o tipo e a opção do relatório desejado</p>
                        </div>
                    </div>

                    <div class="form-body">
                        <div class="form-group">
                            <label class="form-label">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 21v-7"></path>
                                    <path d="M4 10V3"></path>
                                    <path d="M12 21v-9"></path>
                                    <path d="M12 8V3"></path>
                                    <path d="M20 21v-5"></path>
                                    <path d="M20 12V3"></path>
                                    <path d="M1 14h6"></path>
                                    <path d="M9 8h6"></path>
                                    <path d="M17 16h6"></path>
                                </svg>
                                Tipo de Relatório
                            </label>
                            <select class="form-select" id="tipoRelatorio">
                                <option value="">Selecione o tipo de relatório...</option>
                                <option value="vendas">Vendas</option>
                                <option value="estoque">Estoque</option>
                                <option value="financeiro">Financeiro</option>
                            </select>
                        </div>

                        <div class="form-group" id="opcoesRelatorio" style="display: none;">
                            <label class="form-label">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10"></circle>
                                    <path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"></path>
                                    <line x1="12" y1="17" x2="12.01" y2="17"></line>
                                </svg>
                                Opção do Relatório
                            </label>
                            <div class="radio-options" id="radioOptions">
                            </div>
                        </div>
                    </div>

                    <div class="form-footer">
                        <button class="btn-generate" id="btnGerar" disabled onclick="gerarRelatorio()">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                <polyline points="7 10 12 15 17 10"></polyline>
                                <line x1="12" y1="15" x2="12" y2="3"></line>
                            </svg>
                            Gerar Relatório PDF
                        </button>
                    </div>
                </div>

                <div class="preview-section" id="reportPreview" style="display: none;">
                    <div class="preview-card">
                        <div class="preview-header">
                            <div class="preview-header-content">
                                <div class="preview-header-icon">
                                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                        <polyline points="14 2 14 8 20 8"></polyline>
                                    </svg>
                                </div>
                                <div>
                                    <h3>Relatório Gerado</h3>
                                    <p>Seu relatório está pronto para download</p>
                                </div>
                            </div>
                            <button class="btn-close" onclick="fecharPreview()" title="Fechar">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <line x1="18" y1="6" x2="6" y2="18"></line>
                                    <line x1="6" y1="6" x2="18" y2="18"></line>
                                </svg>
                            </button>
                        </div>

                        <div class="preview-body">
                            <div class="preview-icon-large">
                                <svg width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                                    <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                    <polyline points="14 2 14 8 20 8"></polyline>
                                    <line x1="12" y1="18" x2="12" y2="12"></line>
                                    <line x1="9" y1="15" x2="15" y2="15"></line>
                                </svg>
                            </div>
                            <h4 id="previewTitle">Relatório</h4>
                            <p id="previewDescription">Descrição do relatório</p>
                            
                            <div class="preview-info">
                                <div class="info-item">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
                                        <line x1="16" y1="2" x2="16" y2="6"></line>
                                        <line x1="8" y1="2" x2="8" y2="6"></line>
                                        <line x1="3" y1="10" x2="21" y2="10"></line>
                                    </svg>
                                    <span id="previewDate">Data de geração</span>
                                </div>
                                <div class="info-item">
                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                        <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path>
                                        <polyline points="14 2 14 8 20 8"></polyline>
                                        <line x1="12" y1="18" x2="12" y2="12"></line>
                                        <line x1="9" y1="15" x2="15" y2="15"></line>
                                    </svg>
                                    <span>Formato PDF</span>
                                </div>
                            </div>
                        </div>

                        <div class="preview-footer">
                            <button class="btn-download" onclick="baixarPDF()">
                                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                                    <polyline points="7 10 12 15 17 10"></polyline>
                                    <line x1="12" y1="15" x2="12" y2="3"></line>
                                </svg>
                                Baixar Relatório PDF
                            </button>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/relatorios.js}"></script>
</body>
</html>
