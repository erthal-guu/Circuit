<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head.html :: head(titulo = 'Home')}">
</head>

<body>
<div class="container">
    <div th:replace="~{fragments/menu :: sidebar('home')}"></div>
    <main class="main-content">
        <header th:replace="~{fragments/header.html :: header}" class="top-bar"></header>

        <div class="content">
            <div class="hero-container">
                <img th:src="@{/images/Circuit-logo-azul.png}" alt="Circuit Logo" class="home-logo">

                <div class="welcome-section">
                    <h1 class="welcome-title">
                        Bem-vindo de volta, <span class="user-highlight" sec:authentication="name">Usuário</span>!
                    </h1>
                    <p class="welcome-subtitle">
                        Gerencie suas ordens de serviço, vendas e estoque de forma simplificada no ecossistema <strong>Circuit</strong>.
                    </p>
                </div>
            </div>
        </div>
    </main>
</div>
<script th:src="@{/js/home.js}"></script>
</body>
</html>
